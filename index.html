<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Useventtos | Mini Sneaker Deodorizer</title>
  <meta name="description" content="Useventtos Mini Sneaker Deodorizer. Seu tênis sempre pronto para usar." />
  <meta name="theme-color" content="#050705" />

  <meta property="og:title" content="Useventtos | Seu tênis sempre pronto para usar" />
  <meta property="og:description" content="Mini Sneaker Deodorizer com refil aromático e até 30 dias de frescor." />
  <meta property="og:image" content="useventtos-home.png" />

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html{background:#050705}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#050705;
      color:#fff;
      overflow-x:auto;
    }
    .wrap{
      position:relative;
      width:100%;
      max-width:1440px;
      margin:0 auto;
      background:#050705;
    }
    .site-image{
      width:100%;
      height:auto;
      display:block;
      user-select:none;
    }

    .hotspot{
      position:absolute;
      z-index:10;
      display:block;
      border-radius:999px;
      cursor:pointer;
    }

    .buy-header{left:81%;top:3.7%;width:15.5%;height:3.2%}
    .buy-hero{left:4.5%;top:26.1%;width:19.7%;height:3.5%}
    .buy-kit-1{left:5.1%;top:66.9%;width:17.2%;height:2.6%}
    .buy-kit-2{left:51.6%;top:66.9%;width:18.2%;height:2.6%}
    .buy-footer{left:78.2%;top:94.1%;width:17.5%;height:3.1%}

    .floating-buy{
      position:fixed;
      right:22px;
      bottom:22px;
      z-index:30;
      background:#a8ff00;
      color:#111;
      text-decoration:none;
      font-weight:900;
      padding:15px 24px;
      border-radius:999px;
      box-shadow:0 18px 50px rgba(168,255,0,.25);
      transition:.2s ease;
    }
    .floating-buy:hover{transform:translateY(-3px)}

    .popup-overlay{
      position:fixed;
      inset:0;
      z-index:100;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(12px);
      opacity:0;
      visibility:hidden;
      transition:.35s ease;
    }
    .popup-overlay.show{
      opacity:1;
      visibility:visible;
    }
    .popup-box{
      position:relative;
      width:min(92vw,1100px);
      border-radius:26px;
      overflow:hidden;
      box-shadow:
        0 40px 140px rgba(0,0,0,.78),
        0 0 90px rgba(168,255,0,.16);
      border:1px solid rgba(168,255,0,.42);
      transform:translateY(18px) scale(.965);
      transition:.35s ease;
      background:#050705;
    }
    .popup-overlay.show .popup-box{
      transform:translateY(0) scale(1);
    }
    .popup-img{
      width:100%;
      height:auto;
      display:block;
      user-select:none;
      pointer-events:none;
    }
    .popup-close{
      position:absolute;
      right:3.1%;
      top:4.7%;
      width:52px;
      height:52px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.42);
      background:rgba(0,0,0,.32);
      color:#fff;
      font-size:34px;
      line-height:1;
      cursor:pointer;
      z-index:3;
      backdrop-filter:blur(8px);
      transition:.2s ease;
    }
    .popup-close:hover{
      transform:scale(1.06);
      border-color:#a8ff00;
      color:#a8ff00;
    }

    /* Botão invisível em cima do botão "Ver o site" da arte */
    .popup-see-site{
      position:absolute;
      left:36.6%;
      top:80.7%;
      width:26.8%;
      height:7.2%;
      border-radius:999px;
      z-index:3;
      cursor:pointer;
      background:transparent;
      border:0;
    }

    .popup-progress{
      position:absolute;
      left:0;
      bottom:0;
      height:4px;
      width:100%;
      background:rgba(168,255,0,.14);
      z-index:4;
    }
    .popup-progress span{
      display:block;
      width:100%;
      height:100%;
      background:#a8ff00;
      transform-origin:left center;
      animation:timerbar 25s linear forwards;
    }
    @keyframes timerbar{
      from{transform:scaleX(1)}
      to{transform:scaleX(0)}
    }

    .green-glow{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 24% 50%,rgba(168,255,0,.16),transparent 22%),
        radial-gradient(circle at 40% 36%,rgba(168,255,0,.10),transparent 13%);
      mix-blend-mode:screen;
      animation:glowPulse 3.5s ease-in-out infinite alternate;
      z-index:2;
    }
    @keyframes glowPulse{
      from{opacity:.35}
      to{opacity:.72}
    }

    @media(max-width:768px){
      .wrap{
        width:1440px;
        max-width:none;
      }
      .floating-buy{
        right:14px;
        bottom:14px;
        padding:14px 20px;
      }
      .popup-box{
        width:96vw;
        border-radius:18px;
      }
      .popup-close{
        width:42px;
        height:42px;
        font-size:28px;
      }
      .popup-see-site{
        left:33%;
        top:80.2%;
        width:34%;
        height:7.5%;
      }
    }
  </style>
</head>

<body>
  <div class="popup-overlay" id="popup">
    <div class="popup-box">
      <img class="popup-img" src="popup-useventtos.png" alt="Bem-vindo à Useventtos" />
      <div class="green-glow"></div>
      <button class="popup-close" id="closePopup" aria-label="Fechar popup">×</button>
      <button class="popup-see-site" id="seeSite" aria-label="Ver o site"></button>
      <div class="popup-progress"><span></span></div>
    </div>
  </div>

  <main class="wrap">
    <img class="site-image" src="useventtos-home.png" alt="Useventtos Mini Sneaker Deodorizer" />

    <a class="hotspot buy-header" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar agora na Shopee"></a>
    <a class="hotspot buy-hero" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar agora na Shopee"></a>
    <a class="hotspot buy-kit-1" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar Kit Mini Sneaker na Shopee"></a>
    <a class="hotspot buy-kit-2" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar Pack Bolinhas Tradicional na Shopee"></a>
    <a class="hotspot buy-footer" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar agora na Shopee"></a>
  </main>

  <a class="floating-buy" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener">Comprar agora</a>

  <script>
    const popup = document.getElementById("popup");
    const closePopup = document.getElementById("closePopup");
    const seeSite = document.getElementById("seeSite");

    function hidePopup(){
      popup.classList.remove("show");
    }

    window.addEventListener("load", () => {
      setTimeout(() => popup.classList.add("show"), 500);
      setTimeout(hidePopup, 25500);
    });

    closePopup.addEventListener("click", hidePopup);
    seeSite.addEventListener("click", hidePopup);

    popup.addEventListener("click", (event) => {
      if(event.target === popup) hidePopup();
    });
  </script>
</body>
</html>
