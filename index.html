<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Useventtos | Mini Sneaker Deodorizer</title>
  <meta name="description" content="Useventtos Mini Sneaker Deodorizer. Seu tênis sempre pronto para usar." />
  <meta name="theme-color" content="#050705" />

  <meta property="og:title" content="Useventtos | Seu tênis sempre pronto para usar" />
  <meta property="og:description" content="Mini Sneaker Deodorizer com refil aromático e até 30 dias de frescor." />
  <meta property="og:image" content="useventtos-home.png" />

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html{background:#050705}
    body{font-family:Arial,Helvetica,sans-serif;background:#050705;color:#fff;overflow-x:auto}
    .wrap{
      position:relative;
      width:100%;
      max-width:1440px;
      margin:0 auto;
      background:#050705;
    }
    .site-image{
      width:100%;
      height:auto;
      display:block;
      user-select:none;
    }

    /* Áreas clicáveis sobre os botões da imagem */
    .hotspot{
      position:absolute;
      z-index:10;
      display:block;
      border-radius:999px;
      cursor:pointer;
    }

    /* Botão comprar no menu superior */
    .buy-header{
      left:81%;
      top:3.7%;
      width:15.5%;
      height:3.2%;
    }

    /* Botão principal do hero */
    .buy-hero{
      left:4.5%;
      top:26.1%;
      width:19.7%;
      height:3.5%;
    }

    /* Botão do Kit Mini Sneaker */
    .buy-kit-1{
      left:5.1%;
      top:66.9%;
      width:17.2%;
      height:2.6%;
    }

    /* Botão do Pack Bolinhas Tradicional */
    .buy-kit-2{
      left:51.6%;
      top:66.9%;
      width:18.2%;
      height:2.6%;
    }

    /* Botão final inferior */
    .buy-footer{
      left:78.2%;
      top:94.1%;
      width:17.5%;
      height:3.1%;
    }

    .floating-buy{
      position:fixed;
      right:22px;
      bottom:22px;
      z-index:30;
      background:#a8ff00;
      color:#111;
      text-decoration:none;
      font-weight:900;
      padding:15px 24px;
      border-radius:999px;
      box-shadow:0 18px 50px rgba(168,255,0,.25);
      transition:.2s ease;
    }
    .floating-buy:hover{transform:translateY(-3px)}

    .sound-button{
      position:fixed;
      left:22px;
      bottom:22px;
      z-index:30;
      border:1px solid rgba(168,255,0,.45);
      background:rgba(5,7,5,.75);
      color:#a8ff00;
      font-weight:900;
      padding:13px 18px;
      border-radius:999px;
      cursor:pointer;
      backdrop-filter:blur(12px);
      display:none;
    }

    @media(max-width:768px){
      .wrap{
        width:1440px;
        max-width:none;
      }
      .floating-buy{
        right:14px;
        bottom:14px;
        padding:14px 20px;
      }
      .sound-button{
        left:14px;
        bottom:14px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <img class="site-image" src="useventtos-home.png" alt="Useventtos Mini Sneaker Deodorizer" />

    <a class="hotspot buy-header" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar agora na Shopee"></a>
    <a class="hotspot buy-hero" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar agora na Shopee"></a>
    <a class="hotspot buy-kit-1" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar Kit Mini Sneaker na Shopee"></a>
    <a class="hotspot buy-kit-2" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar Pack Bolinhas Tradicional na Shopee"></a>
    <a class="hotspot buy-footer" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar agora na Shopee"></a>
  </main>

  <a class="floating-buy" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener">Comprar agora</a>

</html>
