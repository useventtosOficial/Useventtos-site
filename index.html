<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Useventtos | Mini Sneaker Deodorizer</title>
  <meta name="description" content="Useventtos Mini Sneaker Deodorizer. Seu tênis sempre pronto para usar." />
  <meta name="theme-color" content="#050705" />

  <meta property="og:title" content="Useventtos | Seu tênis sempre pronto para usar" />
  <meta property="og:description" content="Mini Sneaker Deodorizer com refil aromático e até 30 dias de frescor." />
  <meta property="og:image" content="useventtos-home.png" />

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    html{background:#050705}
    body{
      font-family:Arial,Helvetica,sans-serif;
      background:#050705;
      color:#fff;
      overflow-x:auto;
    }
    .wrap{
      position:relative;
      width:100%;
      max-width:1440px;
      margin:0 auto;
      background:#050705;
    }
    .site-image{
      width:100%;
      height:auto;
      display:block;
      user-select:none;
    }

    .hotspot{
      position:absolute;
      z-index:10;
      display:block;
      border-radius:999px;
      cursor:pointer;
    }
    .buy-header{left:81%;top:3.7%;width:15.5%;height:3.2%}
    .buy-hero{left:4.5%;top:26.1%;width:19.7%;height:3.5%}
    .buy-kit-1{left:5.1%;top:66.9%;width:17.2%;height:2.6%}
    .buy-kit-2{left:51.6%;top:66.9%;width:18.2%;height:2.6%}
    .buy-footer{left:78.2%;top:94.1%;width:17.5%;height:3.1%}

    .floating-buy{
      position:fixed;
      right:22px;
      bottom:22px;
      z-index:30;
      background:#a8ff00;
      color:#111;
      text-decoration:none;
      font-weight:900;
      padding:15px 24px;
      border-radius:999px;
      box-shadow:0 18px 50px rgba(168,255,0,.25);
      transition:.2s ease;
    }
    .floating-buy:hover{transform:translateY(-3px)}

    .popup-overlay{
      position:fixed;
      inset:0;
      z-index:100;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:22px;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(12px);
      opacity:0;
      visibility:hidden;
      transition:opacity .38s ease, visibility .38s ease;
    }
    .popup-overlay.show{
      opacity:1;
      visibility:visible;
    }
    .popup-box{
      position:relative;
      width:min(92vw,1100px);
      border-radius:26px;
      overflow:hidden;
      box-shadow:
        0 40px 140px rgba(0,0,0,.78),
        0 0 90px rgba(168,255,0,.16);
      border:1px solid rgba(168,255,0,.42);
      transform:translateY(24px) scale(.95);
      transition:transform .42s cubic-bezier(.16,1,.3,1);
      background:#050705;
      isolation:isolate;
    }
    .popup-overlay.show .popup-box{
      transform:translateY(0) scale(1);
    }
    .popup-img{
      width:100%;
      height:auto;
      display:block;
      user-select:none;
      pointer-events:none;
      position:relative;
      z-index:1;
    }

    /* X invisível por cima do X já existente na arte */
    .popup-close{
      position:absolute;
      right:3.6%;
      top:5.8%;
      width:52px;
      height:52px;
      border-radius:50%;
      border:0;
      background:transparent;
      cursor:pointer;
      z-index:6;
    }

    /* Botão invisível por cima do "Ver o site" da arte */
    .popup-see-site{
      position:absolute;
      left:36.6%;
      top:80.7%;
      width:26.8%;
      height:7.2%;
      border-radius:999px;
      z-index:6;
      cursor:pointer;
      background:transparent;
      border:0;
    }

    .popup-progress{
      position:absolute;
      left:0;
      bottom:0;
      height:3px;
      width:100%;
      background:rgba(168,255,0,.12);
      z-index:7;
    }
    .popup-progress span{
      display:block;
      width:100%;
      height:100%;
      background:#a8ff00;
      transform-origin:left center;
      animation:timerbar 25s linear forwards;
      box-shadow:0 0 14px rgba(168,255,0,.9);
    }
    @keyframes timerbar{
      from{transform:scaleX(1)}
      to{transform:scaleX(0)}
    }

    /* Fumaça/brilho animado por cima do popup */
    .animated-smoke{
      position:absolute;
      inset:-20%;
      z-index:2;
      pointer-events:none;
      background:
        radial-gradient(circle at 24% 44%, rgba(168,255,0,.16), transparent 18%),
        radial-gradient(circle at 31% 61%, rgba(168,255,0,.12), transparent 16%),
        radial-gradient(circle at 16% 22%, rgba(168,255,0,.12), transparent 20%),
        radial-gradient(circle at 43% 36%, rgba(168,255,0,.08), transparent 14%);
      mix-blend-mode:screen;
      filter:blur(18px);
      opacity:.42;
      animation:smokeMove 8s ease-in-out infinite alternate;
    }
    @keyframes smokeMove{
      from{transform:translate3d(-18px,12px,0) scale(1);opacity:.30}
      to{transform:translate3d(22px,-16px,0) scale(1.08);opacity:.58}
    }

    /* Bolinhas/brilhos flutuantes discretos */
    .orb{
      position:absolute;
      z-index:3;
      border-radius:50%;
      pointer-events:none;
      background:radial-gradient(circle at 35% 30%, #d8ff7a, #8bd600 45%, rgba(77,133,0,.35) 72%);
      box-shadow:0 0 28px rgba(168,255,0,.35);
      opacity:.28;
      animation:floatOrb 4.8s ease-in-out infinite alternate;
    }
    .orb.one{width:34px;height:34px;left:42%;top:16%;animation-delay:.2s}
    .orb.two{width:22px;height:22px;left:28%;top:71%;animation-delay:1s}
    .orb.three{width:18px;height:18px;left:47%;top:68%;animation-delay:1.8s}
    @keyframes floatOrb{
      from{transform:translateY(0) translateX(0)}
      to{transform:translateY(-12px) translateX(8px)}
    }

    @media(max-width:768px){
      .wrap{
        width:1440px;
        max-width:none;
      }
      .floating-buy{
        right:14px;
        bottom:14px;
        padding:14px 20px;
      }
      .popup-box{
        width:96vw;
        border-radius:18px;
      }
      .popup-close{
        right:3.3%;
        top:4.5%;
        width:44px;
        height:44px;
      }
      .popup-see-site{
        left:33%;
        top:80.2%;
        width:34%;
        height:7.5%;
      }
    }
  </style>
</head>

<body>
  <div class="popup-overlay" id="popup">
    <div class="popup-box">
      <img class="popup-img" src="popup-useventtos.png" alt="Bem-vindo à Useventtos" />

      <div class="animated-smoke"></div>
      <span class="orb one"></span>
      <span class="orb two"></span>
      <span class="orb three"></span>

      <button class="popup-close" id="closePopup" aria-label="Fechar popup"></button>
      <button class="popup-see-site" id="seeSite" aria-label="Ver o site"></button>

      <div class="popup-progress"><span></span></div>
    </div>
  </div>

  <main class="wrap">
    <img class="site-image" src="useventtos-home.png" alt="Useventtos Mini Sneaker Deodorizer" />

    <a class="hotspot buy-header" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar agora na Shopee"></a>
    <a class="hotspot buy-hero" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar agora na Shopee"></a>
    <a class="hotspot buy-kit-1" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar Kit Mini Sneaker na Shopee"></a>
    <a class="hotspot buy-kit-2" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar Pack Bolinhas Tradicional na Shopee"></a>
    <a class="hotspot buy-footer" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener" aria-label="Comprar agora na Shopee"></a>
  </main>

  <a class="floating-buy" href="https://shopee.com.br/shop/1294719962" target="_blank" rel="noopener">Comprar agora</a>

  <script>
    const popup = document.getElementById("popup");
    const closePopup = document.getElementById("closePopup");
    const seeSite = document.getElementById("seeSite");

    function hidePopup(){
      popup.classList.remove("show");
    }

    window.addEventListener("load", () => {
      setTimeout(() => popup.classList.add("show"), 500);
      setTimeout(hidePopup, 25500);
    });

    closePopup.addEventListener("click", hidePopup);
    seeSite.addEventListener("click", hidePopup);

    popup.addEventListener("click", (event) => {
      if(event.target === popup) hidePopup();
    });
  </script>
</body>
</html>
